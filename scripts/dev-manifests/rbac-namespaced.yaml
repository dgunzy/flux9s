# Per-namespace RBAC scenario for flux9s's "restricted" empty-state (#210).
#
# Layered on top of rbac-restricted.yaml (which grants Kustomizations + Sources
# cluster-wide but denies HelmReleases everywhere). This adds a *namespaced*
# grant so the SAME kind differs by namespace:
#
#   - flux-resources : HelmRelease is VISIBLE (namespaced Role below)
#   - restricted-team: HelmRelease is FORBIDDEN, but Kustomizations/Sources are
#                      visible (cluster-wide grant) — so you see the 🔒 notice
#                      for one kind while other kinds list normally
#   - :ns all        : HelmRelease FORBIDDEN (no cluster-wide grant)
#
# Demo:
#   :ns flux-resources ; :hr   -> HelmReleases list
#   :ns restricted-team ; :ks  -> Kustomization lists ; :hr -> 🔒 restricted
apiVersion: v1
kind: Namespace
metadata:
  name: restricted-team
---
# Something visible in restricted-team so the "others I can see" half is real.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: demo-source
  namespace: restricted-team
spec:
  interval: 5m
  url: https://github.com/fluxcd/flux2-kustomize-helm-example
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demo-app
  namespace: restricted-team
spec:
  interval: 5m
  path: ./apps/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: demo-source
---
# Namespaced grant: HelmRelease visible ONLY in flux-resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flux9s-helmreleases
  namespace: flux-resources
rules:
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flux9s-helmreleases
  namespace: flux-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flux9s-helmreleases
subjects:
  - kind: ServiceAccount
    name: flux9s-restricted
    namespace: flux-system
