version: 2
updates:
  # Keep the SHA-pinned actions current (pins never move on their own).
  # Monthly, not weekly: action releases are infrequent and one batched PR a
  # month is enough churn. Patch/minor auto-merge once CI is green; see
  # dependabot-auto-merge.yaml. Branch-ref pins (dtolnay/rust-toolchain@<sha>
  # # master) aren't tracked here — re-pin those manually (see CLAUDE.md).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine bumps; majors stay separate for review
      cargo-minor-patch:
        update-types: ["minor", "patch"]
